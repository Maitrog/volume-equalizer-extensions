name: Validate locales

on:
  pull_request:
    paths:
      - "_locales/**"
      - "tools/validateLocalizationLengths.js"
      - "package.json"
      - ".github/workflows/validate-locales.yml"

  push:
    branches:
      - main
    paths:
      - "_locales/**"
      - "tools/validateLocalizationLengths.js"
      - "package.json"
      - ".github/workflows/validate-locales.yml"

jobs:
  validate-locales:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate localization lengths
        run: npm run lint:locales
